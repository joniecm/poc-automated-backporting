name: Backport merged pull request
on:
  pull_request_target:
    types: [closed]
permissions:
  contents: write
  pull-requests: write
jobs:
  backport:
    name: Backport pull request
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged
    steps:
      - uses: actions/checkout@v4
      - name: Create backport pull requests
        uses: korthout/backport-action@v4
        with:
          # Matches labels like "target:release/1.0" and captures "release/1.0"
          label_pattern: "^target:([^ ]+)$"

          # Auto-merge clean backport PRs
          auto_merge_enabled: true
          auto_merge_method: squash

          # On conflict, create a draft PR with conflicts committed for manual resolution
          experimental: '{"conflict_resolution": "draft_commit_conflicts"}'

          # Skip merge commits during cherry-pick (handles PRs kept in sync via merge)
          merge_commits: skip
